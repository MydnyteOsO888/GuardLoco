name: carguard
description: CarGuard — Real-time Vehicle Security System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  firebase_auth: ^5.1.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # WebRTC (live stream)
  flutter_webrtc: ^0.11.2

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Local Notifications
  flutter_local_notifications: ^17.1.2

  # Video Player (recorded clips)
  video_player: ^2.8.6
  chewie: ^1.8.1

  # UI Extras
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  gap: ^3.0.1
  lottie: ^3.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11
  retrofit_generator: ^8.1.0
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
